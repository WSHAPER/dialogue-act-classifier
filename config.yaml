base_model: distilbert-base-uncased
max_seq_length: 128
batch_size: 32
learning_rate: 2.0e-5
num_epochs: 4
warmup_ratio: 0.1
weight_decay: 0.01
seed: 42
output_dir: models/en
label_map:
  0: statement
  1: question
  2: instruction
dataset:
  name: eusip/silicone
  config: dyda_da
  dailydialog_map:
    0: 0
    1: 2
    2: 0
    3: 1
augmentation: tests/test_cases.json
